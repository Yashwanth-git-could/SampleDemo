steps:
# Build the Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-t'
    - 'europe-west1-docker.pkg.dev/$PROJECT_ID/fastapi-repo/fastapi-app:$COMMIT_SHA'
    - '-t'
    - 'europe-west1-docker.pkg.dev/$PROJECT_ID/fastapi-repo/fastapi-app:latest'
    - '.'

# Push to Artifact Registry (with commit SHA)
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - 'europe-west1-docker.pkg.dev/$PROJECT_ID/fastapi-repo/fastapi-app:$COMMIT_SHA'

# Push to Artifact Registry (latest tag)
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - 'europe-west1-docker.pkg.dev/$PROJECT_ID/fastapi-repo/fastapi-app:latest'

# Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - 'run'
    - 'deploy'
    - 'fastapi-service'
    - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/fastapi-repo/fastapi-app:$COMMIT_SHA'
    - '--region=europe-west1'
    - '--platform=managed'
    - '--allow-unauthenticated'
    - '--port=8080'
    - '--memory=512Mi'
    - '--cpu=1'
    - '--max-instances=10'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/fastapi-repo/fastapi-app:$COMMIT_SHA'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/fastapi-repo/fastapi-app:latest'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
